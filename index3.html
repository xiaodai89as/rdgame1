<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://riddle-school.online;">
    <title>Riddle School 3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #player {
            width: 100vw;
            height: 100vh;
        }
        #player ruffle-player {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
</head>
<body>
    <div id="player"></div>
    <script>
        window.addEventListener("DOMContentLoaded", async () => {
            const ruffle = await window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            player.style.width = "100%";
            player.style.height = "100%";
            document.getElementById("player").appendChild(player);
            player.load("game3.swf");
        });
    </script>
</body>
</html>
